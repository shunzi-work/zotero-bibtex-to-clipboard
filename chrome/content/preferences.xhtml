<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul" style="padding:16px;">
  <!-- Title -->
  <label value="BibClip Settings" style="font-size:16px;font-weight:bold;margin-bottom:12px;"/>
  
  <!-- Separator -->
  <separator style="margin:8px 0;"/>
  
  <!-- Fields to Export Section -->
  <groupbox>
    <label value="Fields to export" style="font-weight:bold;margin-bottom:8px;"/>
    
    <!-- 3-column grid layout -->
    <hbox align="start" style="margin-left:12px;">
      <vbox flex="1" style="min-width:120px;">
        <checkbox label="Title"       preference="extensions.bibclip.field.title"/>
        <checkbox label="Journal"     preference="extensions.bibclip.field.journal"/>
        <checkbox label="Pages"       preference="extensions.bibclip.field.pages"/>
        <checkbox label="ISBN"        preference="extensions.bibclip.field.isbn"/>
      </vbox>
      <vbox flex="1" style="min-width:120px;margin-left:12px;">
        <checkbox label="Author"      preference="extensions.bibclip.field.author"/>
        <checkbox label="Volume"      preference="extensions.bibclip.field.volume"/>
        <checkbox label="DOI"         preference="extensions.bibclip.field.doi"/>
        <checkbox label="ISSN"        preference="extensions.bibclip.field.issn"/>
      </vbox>
      <vbox flex="1" style="min-width:120px;margin-left:12px;">
        <checkbox label="Year"        preference="extensions.bibclip.field.year"/>
        <checkbox label="Number"      preference="extensions.bibclip.field.number"/>
        <checkbox label="URL"         preference="extensions.bibclip.field.url"/>
        <checkbox label="Language"    preference="extensions.bibclip.field.language"/>
      </vbox>
    </hbox>
    
    <!-- Additional fields in single column -->
    <vbox style="margin-left:12px;margin-top:8px;">
      <checkbox label="Abstract"      preference="extensions.bibclip.field.abstract"/>
    </vbox>
  </groupbox>
  
  <!-- Separator -->
  <separator style="margin:12px 0;"/>
  
  <!-- Journal Names Section -->
  <groupbox>
    <label value="Journal names" style="font-weight:bold;margin-bottom:8px;"/>
    <vbox style="margin-left:12px;">
      <radio label="Use abbreviated name (if available)" value="abbreviated" preference="extensions.bibclip.journal_name_mode"/>
      <radio label="Always use full name" value="full" preference="extensions.bibclip.journal_name_mode"/>
    </vbox>
  </groupbox>
</vbox>
